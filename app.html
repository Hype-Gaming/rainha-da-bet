<!doctype html>
<html {{ HTML_ATTRS }}>
    <head {{ HEAD_ATTRS }}>
        {{ HEAD }}

        <!-- Prevenir FOUC (Flash of Unstyled Content) -->
        <style>
            #__nuxt {
                opacity: 0;
                transition: opacity 0.2s ease-in;
            }
            #__nuxt.nuxt-loaded {
                opacity: 1;
            }
            .initial-loading {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.98);
                backdrop-filter: blur(5px);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 99999;
                transition: opacity 0.3s ease-out;
            }
            .initial-loading.loaded {
                opacity: 0;
                pointer-events: none;
            }
            .initial-spinner {
                width: 50px;
                height: 50px;
                border: 4px solid rgba(251, 101, 166, 0.15);
                border-top-color: #fb65a6;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>

        <!-- PWA Meta Tags -->
        <meta name="application-name" content="Rainha da Bet" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Rainha da Bet" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="theme-color" content="#fb65a6" />

        <!-- Manifest -->
        <link rel="manifest" href="/manifest.json" />

        <!-- iOS Icons -->
        <link rel="apple-touch-icon" href="/images/logo.png" />

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="/images/logo.png" />

        <!-- SEO Meta Tags -->
        <meta
            name="description"
            content="Rainha da Bet - Plataforma exclusiva para acompanhar jogos ao vivo com análises inteligentes e estatísticas em tempo real."
        />
        <meta
            name="keywords"
            content="Rainha da Bet, Cassino Ao Vivo, Bac Bo, Estatísticas, Análise de padrões, Jogos ao vivo"
        />
        <meta name="author" content="Rainha da Bet" />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://app.rainhadabet.com/" />
        <meta
            property="og:title"
            content="Rainha da Bet - Análises e Estatísticas em Tempo Real"
        />
        <meta
            property="og:description"
            content="Rainha da Bet - Plataforma exclusiva com análises inteligentes e estatísticas em tempo real para jogos ao vivo."
        />
        <meta property="og:image" content="/images/logo.png" />

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:url" content="https://app.rainhadabet.com/" />
        <meta
            property="twitter:title"
            content="Rainha da Bet - Análises em Tempo Real"
        />
        <meta
            property="twitter:description"
            content="Rainha da Bet - Plataforma exclusiva com análises inteligentes e estatísticas em tempo real."
        />
        <meta property="twitter:image" content="/images/logo.png" />
    </head>

    <body {{ BODY_ATTRS }}>
        <div class="initial-loading" id="initial-loading">
            <div class="initial-spinner"></div>
        </div>
        {{ APP }}

        <!-- Remove loading inicial -->
        <script>
            window.addEventListener("load", function () {
                setTimeout(function () {
                    document
                        .getElementById("__nuxt")
                        .classList.add("nuxt-loaded");
                    var loading = document.getElementById("initial-loading");
                    if (loading) {
                        loading.classList.add("loaded");
                        setTimeout(function () {
                            loading.style.display = "none";
                        }, 300);
                    }
                }, 150);
            });
        </script>

        <!-- Service Worker Registration -->
        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker
                        .register("/sw.js")
                        .then((registration) => {
                            console.log(
                                "Service Worker registrado com sucesso:",
                                registration.scope,
                            );
                        })
                        .catch((error) => {
                            console.log(
                                "Falha ao registrar Service Worker:",
                                error,
                            );
                        });
                });
            }
        </script>
    </body>
</html>
